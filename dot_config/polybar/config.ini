[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #5b9fc3
secondary = #8ABEB7
alert = #A54242
disabled = #707880
urgent = #ff0000

[bar/main]
width = 100%
height = 20pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = ÓāĽ
separator-foreground = ${colors.disabled}

font-0 = Hack Nerd Font;2

modules-left = i3
modules-center = date
modules-right = filesystem memory cpu pulseaudio microphone backlight battery systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 2pt
tray-spacing = 4pt

[module/i3]
type = internal/i3

ws-icon-0 = 1;1 ÔĄ°
ws-icon-1 = 2;2 ÔāÜ
ws-icon-2 = 3;3 Ôā¨
ws-icon-3 = 4;4 ÔĄą
ws-icon-4 = 5;5
ws-icon-5 = 6;6
ws-icon-6 = 7;7
ws-icon-7 = 8;8
ws-icon-8 = 9;9
ws-icon-9 = 10;10
ws-icon-default = 

enable-click = true
enable-scroll = false

label-focused = %icon%
label-focused-background = ${colors.primary}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %icon%
label-unfocused-padding = 2

label-visible = %icon%
label-visible-background = ${colors.backgroud-alt}
label-visible-underline = ${colors.secondary}
label-visible-padding = 2

label-urgent = %icon%
label-urgent-background = ${colors.urgent}
label-urgent-foreground = #ffffff
label-urgent-padding = 2

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = ůįÜľ %percentage_used%%
label-mounted-foreground = ${colors.foreground}

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

label-muted = ůįĚü
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = ůįēŅ
ramp-volume-1 = ůįĖÄ
ramp-volume-2 = ůįēĺ

[module/microphone]
type = custom/script
interval = 1
exec = pactl get-source-mute @DEFAULT_SOURCE@ 2>/dev/null | awk 'BEGIN { icon = "ůįć≠" } $2 == "no" { icon = "ůįć¨" } END { print icon }'
click-left = pactl set-source-mute @DEFAULT_SOURCE@ toggle

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįćõ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ůįĽ† "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/backlight]
type = custom/script
interval = 1
exec = xbacklight -get | awk '{printf "ůįÉ† %d%%\n", $1+0.5}'

[module/battery]
type = internal/battery
battery = BAT0
adapter = ucsi-source-psy-USBC000:001
poll-interval = 5

full-at = 99

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

format-full = <ramp-capacity> <label-full>
label-full = Full

ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀľ
ramp-capacity-2 = ůįĀĺ
ramp-capacity-3 = ůįāÄ
ramp-capacity-4 = ůįāā
ramp-capacity-0-foreground = ${colors.alert}

animation-charging-0 = ůįĘú
animation-charging-1 = ůįāá
animation-charging-2 = ůįĘĚ
animation-charging-3 = ůįĘě
animation-charging-4 = ůįāč
animation-charging-framerate = 750

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d %H:%M:%S (%a)
date-alt = %A, %d %B %Y %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true
